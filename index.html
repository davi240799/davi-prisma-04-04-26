<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercícios JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  
  <section class="card">
    <h2>Lionel Messi</h2>
    <img src="https://wallpaperaccess.com/full/9397190.jpg" alt="Foto de perfil" class="profile-img">
    <p>Mostrar informações</p>

    <button id="toggleBtn">Clique Aqui!</button>

    <div id="details">
      <p>Email: LionelMessi@email.com</p>
      <p>Localização: Argentina</p>
      <p>Profissão: Jogador de Futebol</p>
      <p>idade: 38 anos</p>
    </div>
  </section>

  
  <section class="todo">
    <h2>Lista de Tarefas</h2>

    <form id="todoForm">
      <input type="text" id="taskInput" placeholder="Digite uma tarefa..." required>
      <button type="submit">Adicionar</button>
    </form>

    <ul id="taskList"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
